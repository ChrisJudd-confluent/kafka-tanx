; =============================================================================
; KafkaTanx — client configuration
; =============================================================================
;
; This file is committed to git with the Confluent Cloud credentials pre-filled.
; The service account has restricted ACLs: read/write to kafkatanx-* topics only.
; It cannot create topics, access other clusters, or read analytics outputs.
;
; player.id is auto-generated on first launch — do not edit it.
; player.name is prompted in-game on first launch and written back here.
; =============================================================================

[kafka]
bootstrap.servers=REPLACE_WITH_BOOTSTRAP_SERVER
security.protocol=SASL_SSL
sasl.mechanisms=PLAIN
sasl.username=REPLACE_WITH_API_KEY
sasl.password=REPLACE_WITH_API_SECRET

[schema-registry]
url=REPLACE_WITH_SCHEMA_REGISTRY_URL
basic.auth.credentials.source=USER_INFO
basic.auth.user.info=REPLACE_WITH_SR_KEY:REPLACE_WITH_SR_SECRET

[schema-ids]
; These are assigned by Confluent Schema Registry when the admin registers
; the .avsc files in the schemas/ directory. Fill in after registration.
; The admin runs: confluent schema-registry schema create --subject <topic>-value --schema schemas/<File>.avsc
session=0
gameplay=0
player=0
shot=0
round=0
game=0

[player]
; Auto-generated on first launch — do not edit
player.id=
; Your display name (shown to your opponent). Prompted in-game if blank.
player.name=
